blueprint:
  name: "Anunciar via Alexa Devices (Corrigido)"
  description: "Anuncia via entidade notify, ajusta volume e retorna para 3."
  domain: script
mode: queued
icon: mdi:bullhorn

fields:
  mensagem:
    name: "Mensagem"
    required: true
    selector:
      text:

  onde_anunciar:
    name: "Onde anunciar?"
    description: "Selecione a entidade de notificação (ex: notify.alexa_media_echo_dot)"
    required: true
    selector:
      entity:
        multiple: false
        filter:
          - domain: notify

  volume:
    name: "Volume:"
    required: true
    default: 7
    selector:
      number:
        min: 0
        max: 10
        step: 1

sequence:
  # 1. Ajustar o Volume
  # Usamos a própria entidade de notify para extrair o nome do serviço
  - action: "{{ onde_anunciar }}"
    data:
      message: "volume {{ volume | int }}"
      data:
        type: "tts"
        method: "all"

  - delay:
      seconds: 1

  # 2. Enviar a Mensagem
  - action: "{{ onde_anunciar }}"
    data:
      message: "{{ mensagem }}"

  - delay:
      seconds: 5

  # 3. Retornar Volume para 3
  - action: "{{ onde_anunciar }}"
    data:
      message: "volume 3"
      data:
        type: "tts"
        method: "all"