blueprint:
  name: "Anunciar via Alexa (Fix)"
  description: "Ajusta volume e anuncia."
  domain: script
mode: queued

fields:
  mensagem:
    name: "Mensagem"
    required: true
    selector:
      text:
  onde_anunciar:
    name: "Selecione a Alexa"
    description: "Escolha a entidade notify (ex: notify.alexa_media_sala)"
    required: true
    selector:
      entity:
        filter:
          - domain: notify
  volume:
    name: "Volume"
    default: 7
    selector:
      number:
        min: 0
        max: 10

sequence:
  # 1. Ajustar Volume via comando de texto
  - action: "{{ onde_anunciar }}"
    data:
      message: "volume {{ volume | int }}"

  - delay:
      seconds: 1

  # 2. Falar a mensagem
  - action: "{{ onde_anunciar }}"
    data:
      message: "{{ mensagem }}"

  - delay:
      seconds: 5

  # 3. Retornar Volume para 3
  - action: "{{ onde_anunciar }}"
    data:
      message: "volume 3"