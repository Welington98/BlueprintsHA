blueprint:
  name: "Anunciar via Alexa (Definitivo)"
  description: "Ajusta volume nativo no media_player, anuncia e retorna ao original."
  domain: script
mode: queued

fields:
  mensagem:
    name: "Mensagem"
    required: true
    selector:
      text:
  onde_anunciar:
    name: "Selecione a Alexa"
    description: "⚠️ Escolha a entidade MEDIA PLAYER (ex: media_player.echo_dot_de_welington)"
    required: true
    selector:
      entity:
        filter:
          - domain: media_player
  volume:
    name: "Volume (0 a 10)"
    default: 7
    selector:
      number:
        min: 0
        max: 10

sequence:
  # 1. Ajusta o volume usando o controle nativo (HA usa 0.0 a 1.0, então dividimos por 10)
  - action: media_player.volume_set
    target:
      entity_id: "{{ onde_anunciar }}"
    data:
      volume_level: "{{ volume | float / 10 }}"

  - delay:
      seconds: 1

  # 2. Faz o anúncio usando o serviço central da integração
  - action: notify.alexa_media
    data:
      target: "{{ onde_anunciar }}"
      message: "{{ mensagem }}"
      data:
        type: announce

  - delay:
      seconds: 5

  # 3. Retorna o volume para o nível 3 (0.3 no sistema nativo)
  - action: media_player.volume_set
    target:
      entity_id: "{{ onde_anunciar }}"
    data:
      volume_level: 0.3