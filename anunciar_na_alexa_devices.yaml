blueprint:
  name: "Anunciar via Alexa (Baseado no Teste)"
  description: "Ajusta volume via media_player, anuncia usando a ação nativa e retorna."
  domain: script

mode: queued
icon: mdi:bullhorn

fields:
  mensagem:
    name: "Mensagem"
    required: true
    selector:
      text:

  onde_anunciar:
    name: "Selecione a Alexa"
    description: "Escolha a entidade MEDIA PLAYER (ex: media_player.echo_dot_de_welington)"
    required: true
    selector:
      entity:
        filter:
          - domain: media_player

  volume_anuncio:
    name: "Volume para Falar (0 a 10)"
    default: 5
    selector:
      number:
        min: 0
        max: 10
        step: 1

  volume_retorno:
    name: "Volume de Retorno (0 a 10)"
    default: 7
    selector:
      number:
        min: 0
        max: 10
        step: 1

sequence:
  # 1. Ajusta o volume usando o media_player selecionado (ex: 5 vira 0.5)
  - action: media_player.volume_set
    target:
      entity_id: "{{ onde_anunciar }}"
    data:
      volume_level: "{{ volume_anuncio | float / 10 }}"

  # 2. Delay para a Alexa registrar o volume
  - delay:
      seconds: 2

  # 3. Mágica do Template: Pega o "media_player.echo_dot..." e transforma em "notify.alexa_media_echo_dot..."
  - action: "notify.alexa_media_{{ onde_anunciar | replace('media_player.', '') }}"
    data:
      message: "{{ mensagem }}"

  # 4. Delay da mensagem
  - delay:
      seconds: 6

  # 5. Retorna o volume original
  - action: media_player.volume_set
    target:
      entity_id: "{{ onde_anunciar }}"
    data:
      volume_level: "{{ volume_retorno | float / 10 }}"